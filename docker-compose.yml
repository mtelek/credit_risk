services:
  postgres:
    image: postgres:16
    container_name: credit_risk_db
    command: ["postgres", "-c", "max_wal_size=4GB", "-c", "checkpoint_timeout=15min"]
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d credit_risk"]
      interval: 15s
      retries: 5
  app:
    build: .
    container_name: credit_risk_app
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
    command: "python src/project.py"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    env_file:
      - .env
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_completed_successfully
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
