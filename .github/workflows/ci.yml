name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  pipeline-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: credit_risk
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DEBUG_EDA: "False"
      FORCE_RECOMPUTE: "False"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create local env file
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_HOST=.*/POSTGRES_HOST=postgres/' .env
          sed -i 's/^POSTGRES_PORT=.*/POSTGRES_PORT=5432/' .env
          sed -i 's/^FORCE_RECOMPUTE=.*/FORCE_RECOMPUTE=False/' .env
          sed -i 's/^DEBUG_EDA=.*/DEBUG_EDA=False/' .env

      - name: Build and run pipeline
        run: |
          docker compose version
          mkdir -p data/raw/accepted_2007_to_2018q4.csv
          cp tests/fixture_accepted_loans.csv data/raw/accepted_2007_to_2018q4.csv/accepted_2007_to_2018Q4.csv
          docker compose up -d postgres
          docker compose ps
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U admin -d credit_risk; then
              break
            fi
            sleep 2
          done
          docker compose up --build --abort-on-container-exit app

      - name: Verify expected artifacts exist
        run: |
          for f in outputs/train_class_balance.csv outputs/test_class_balance.csv outputs/model_comparison.csv; do
            if [ ! -f "$f" ]; then
              echo "Missing expected artifact: $f"
              exit 1
            fi
          done
          echo "Smoke test artifacts verified"

      - name: Show artifact summary
        run: |
          ls -1 outputs | sort
