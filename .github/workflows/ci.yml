name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  pipeline-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: credit_risk
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DEBUG_EDA: "False"
      FORCE_RECOMPUTE: "False"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create local env file
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_HOST=.*/POSTGRES_HOST=postgres/' .env
          sed -i 's/^POSTGRES_PORT=.*/POSTGRES_PORT=5432/' .env
          sed -i 's/^FORCE_RECOMPUTE=.*/FORCE_RECOMPUTE=False/' .env
          sed -i 's/^DEBUG_EDA=.*/DEBUG_EDA=False/' .env

      - name: Build and run pipeline
        run: |
          docker compose version
          mkdir -p data/raw/accepted_2007_to_2018q4.csv
          cp tests/fixture_accepted_loans.csv data/raw/accepted_2007_to_2018q4.csv/accepted_2007_to_2018Q4.csv
          docker compose up -d postgres
          docker compose ps
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U admin -d credit_risk; then
              break
            fi
            sleep 2
          done
          docker compose up --build --abort-on-container-exit app

      - name: Verify expected artifacts exist
        run: |
          test -f outputs/iv_table.csv
          test -f outputs/train_class_balance.csv
          test -f outputs/test_class_balance.csv
          test -f outputs/logit_stats.csv
          test -f outputs/logreg_coefficients.csv
          test -f outputs/model_comparison.csv
          test -f outputs/roc_comparison.png
          test -f outputs/ks_decile_logreg.png
          test -f outputs/ks_decile_xgboost.png
          test -f outputs/calibration_plot_.png
          test -f outputs/xgboost_feature_importance.png

      - name: Show artifact summary
        run: |
          ls -1 outputs | sort
